<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Glamour | Elite Lifestyle, Global Connectivity & Rewards</title>
    <meta name="title" content="Glamour | Elite Lifestyle, Global Connectivity & Rewards" />
    <meta name="description" content="Discover Glamour, the premier lifestyle platform connecting African creators with global opportunities. Showcase your culture, monetize your creativity, and earn in Euros and Pounds." />
    <meta name="keywords" content="lifestyle rewards, African content creators, global collaboration, monetize lifestyle, earn in Euros, Glamour platform, creative exchange, luxury lifestyle Africa" />
    <meta name="author" content="Glamour" />
    <link rel="canonical" href="https://glamourweb.com.ng/" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/assets/favicon/site.webmanifest" />
    <meta name="theme-color" content="#02140d" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://glamourweb.com.ng/" />
    <meta property="og:title" content="Glamour | Elite Lifestyle, Global Connectivity & Rewards" />
    <meta property="og:description" content="Connect with global audiences, showcase your unique lifestyle, and unlock premium earning opportunities with Glamour." />
    <meta property="og:image" content="/assets/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://glamourweb.com.ng/" />
    <meta property="twitter:title" content="Glamour | Elite Lifestyle, Global Connectivity & Rewards" />
    <meta property="twitter:description" content="The premier platform for African creators to connect globally and monetize their creativity." />
    <meta property="twitter:image" content="/assets/og-image.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Glamour",
      "url": "https://glamourweb.com.ng/",
      "logo": "https://glamourweb.com.ng/assets/logo.svg",
      "sameAs": [
        "https://www.instagram.com/glamour",
        "https://twitter.com/glamour",
        "https://www.facebook.com/glamour"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+234-800-GLAMOUR",
        "contactType": "customer service",
        "email": "support@glamourweb.com.ng"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://glamourweb.com.ng/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://glamourweb.com.ng/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
